name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Grant the workflow permission to create and edit releases.
permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Run workspace tests
        run: cargo test --workspace

      - name: Build tsw-cli (Windows side artifact)
        run: cargo build --release -p tsw-cli

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build Tauri bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: cargo tauri build

      - name: Stage Windows release assets
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/bundle/msi/*.msi dist/ 2>/dev/null || true
          cp target/release/bundle/nsis/*.exe dist/ 2>/dev/null || true
          cp target/release/tsw-downloader.exe dist/ 2>/dev/null || true
          ls -la dist/

      - name: Upload Windows CI artifacts
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: tsw-modern-launcher-windows
          path: dist/*
          retention-days: 7

      - name: Upload Windows binaries to release (tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.msi
            dist/*.exe
          draft: true
          fail_on_unmatched_files: false
          token: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust with musl target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl build tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Run tsw-core and tsw-cli tests
        run: cargo test -p tsw-core -p tsw-cli

      - name: Build tsw-cli (Linux musl, static)
        run: cargo build --release --target x86_64-unknown-linux-musl -p tsw-cli

      - name: Strip binary
        run: strip target/x86_64-unknown-linux-musl/release/tsw-downloader

      - name: Verify static linkage
        run: |
          file target/x86_64-unknown-linux-musl/release/tsw-downloader
          if ldd target/x86_64-unknown-linux-musl/release/tsw-downloader 2>&1 | grep -q "not a dynamic executable\|statically linked"; then
            echo "OK: binary is statically linked"
          else
            echo "FAIL: binary has dynamic dependencies"
            ldd target/x86_64-unknown-linux-musl/release/tsw-downloader
            exit 1
          fi

      - name: Stage release asset
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-musl/release/tsw-downloader \
             dist/tsw-downloader-linux-x86_64

      - name: Upload Linux CI artifact
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: tsw-downloader-linux
          path: dist/tsw-downloader-linux-x86_64
          retention-days: 7

      - name: Upload Linux binary to release (tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/tsw-downloader-linux-x86_64
          draft: true
          fail_on_unmatched_files: true
          token: ${{ secrets.GITHUB_TOKEN }}
